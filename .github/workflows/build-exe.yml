name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Convert PNG icon to ICO
        run: |
          python - << 'EOF'
          from PIL import Image
          img = Image.open("assets/sun-tzu-icon.png")
          img.save("assets/sun-tzu-icon.ico", format="ICO", sizes=[(256,256),(64,64),(32,32),(16,16)])
          print("Icon converted successfully.")
          EOF
        shell: bash

      - name: Build executable with PyInstaller
        run: pyinstaller suntzu.spec

      - name: Verify executable was created
        run: |
          if (Test-Path "dist\SunTzu-AoE2.exe") {
            Write-Host "Executable built successfully"
            $size = (Get-Item "dist\SunTzu-AoE2.exe").Length / 1MB
            Write-Host ("File size: {0:N1} MB" -f $size)
          } else {
            Write-Error "Executable not found!"
            exit 1
          }
        shell: pwsh

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SunTzu-AoE2-exe
          path: dist/SunTzu-AoE2.exe
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SunTzu-AoE2.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
